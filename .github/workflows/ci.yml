name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-saas:
    name: SaaS テスト & ビルド
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: saas/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://dummy.supabase.co
          VITE_SUPABASE_ANON_KEY: dummy-key

  test-hp:
    name: HP ビルド
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hp/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-key
          RESEND_API_KEY: dummy-key
